<!DOCTYPE html>
<html>

<head>
    <title>Homework 1</title>

    <link href="css/homework1.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

</head>

<body>
    <div id="container">
        <div class="header">
            <div>
                <img src="../image/icon.jpg" width="150px" height="100px" />
            </div>
            <div>
                <h1>phone number</h1>
            </div>

        </div>

        <div class="topnav">
            <div>
                <h1>Menu</h1>
            </div>
        </div>

        <div class="slideshow-container">

            <div class="mySlides fade">
                <div class="numbertext">1 / 3</div>
                <img src="../image/pic2.png" style="width:1000px" height="300px">
                <div class="text">Caption Text</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">2 / 3</div>
                <img src="../image/pic3.png" style="width:1000px" height="300px">
                <div class="text">Caption Two</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">3 / 3</div>
                <img src="../image/pic4.png" style="width:1000px" height="300px">
                <div class="text">Caption Three</div>
            </div>
            <a class="prev" onclick="plusSlides(-1)">❮</a>
            <a class="next" onclick="plusSlides(1)">❯</a>
        </div>
        <br>

        <div style="text-align:center">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>

        <div class="feat">
            <div class="column2">
                <h2>feat 1</h2>
            </div>
            <div class="column2">
                <h2>feat 2</h2>
            </div>
            <div class="column2">
                <h2>feat 3</h2>
            </div>
            <div class="column2">
                <h2>feat 4</h2>
            </div>
        </div>

        <div>
            <div>
                <aside class="aside">
                    <p>Sidebar</p>
                </aside>
            </div>
            
            <div>
                <p id="content">Content</p>
            </div>
                    
            
        </div>

        <div class="footer">
            <h1>Footer</h1>
        </div>
    </div>

    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function currentSlide(n) {
            showSlides(slideIndex = n);
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");
            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " active";
        }
    </script>

</body>

</html>
