<!DOCTYPE html>
<html>

<head>
    <title>Homework 1</title>

    <link href="css/homework1.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

</head>

<body>
    
    <div id="container">
        <div class="header">
            <div>
                <img src="../image/icon.jpg" width="150px" height="100px"/>
            </div>
            <div id="phone">
                <h1>017-6557328</h1>
            </div>
        </div>

        <div class="topnav">
            <div>
                <a href="#">Link 1</a>
                <a href="#">Link 2</a>
                <a href="#">Link 3</a>
                <a href="#">Link 4</a>
            </div>
        </div>

        <div class="slideshow-container">

            <div class="mySlides fade">
              <img src="../image/pic1.jpg" style="width:100%">
            </div>
            
            <div class="mySlides fade">
              <img src="../image/pic2.jpg" style="width:100%">
            </div>
            
            <div class="mySlides fade">
              <img src="../image/pic3.jpg" style="width:100%">
            </div>

            <div class="mySlides fade">
                <img src="../image/pic4.jpg" style="width:100%">
              </div>
            
            <a class="prev" onclick="plusSlides(-1)">❮</a>
            <a class="next" onclick="plusSlides(1)">❯</a>
            
            </div>
            
            <div style="text-align:center">
              <span class="dot" onclick="currentSlide(1)"></span> 
              <span class="dot" onclick="currentSlide(2)"></span> 
              <span class="dot" onclick="currentSlide(3)"></span> 
              <span class="dot" onclick="currentSlide(4)"></span> 
            </div>

            <div class="feat">
                <div class="feat2" >
                    <img src="../image/Lebron.jpg" >
                </div>
                <div class="feat2" >
                    <img src="../image/kobe.jpg" >
                </div>
                <div class="feat2" >
                    <img src="../image/luka.jpg" >
                </div>
                <div class="feat2" >
                    <img src="../image/kyrie.jpg" >
                </div>
            </div>

        <div class="content">
        
            <div id="text">
               <p>Content</p>
            </div>
            
            <div id="sidebar">
                <div class="sidebar">
                    <a href="#">Link 1</a>
                </div>
                <div class="sidebar">
                    <a href="#">Link 2</a>
                </div>
                <div class="sidebar">
                    <a href="#">Link 3</a>
                </div>
                <div class="sidebar">
                    <a href="#">Link 4</a>
                </div>
            </div>
         </div>

        <div class="footer">
            <h1>Footer</h1>
        </div>
    </div>

    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function currentSlide(n) {
            showSlides(slideIndex = n);
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");
            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " active";
        }
    </script>

</body>

</html>
